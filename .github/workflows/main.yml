name: Build

on:
    push:
        branches:
            - main

permissions:
    contents: write

env:
    PLUGIN_SLUG: wordpress_rallyestage
    BASE_VERSION: 1.0.0

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Compute version and tag
              shell: bash
              run: |
                  set -euo pipefail

                  TAG="v${BASE_VERSION}-${GITHUB_RUN_NUMBER}"
                  VERSION="${TAG#v}"

                  echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
                  echo "TAG=${TAG}" >> "$GITHUB_ENV"

            - name: Build plugin zip
              shell: bash
              run: |
                  set -euo pipefail

                  BUILD_DIR="dist"
                  PACKAGE_DIR="${BUILD_DIR}/${PLUGIN_SLUG}"
                  ZIP_NAME="${PLUGIN_SLUG}-${TAG}.zip"

                  rm -rf "${BUILD_DIR}"
                  mkdir -p "${PACKAGE_DIR}"

                  rsync -av ./ "${PACKAGE_DIR}/" \
                    --exclude='.git' \
                    --exclude='.github' \
                    --exclude='dist'

                  (
                    cd "${BUILD_DIR}"
                    zip -r "${ZIP_NAME}" "${PLUGIN_SLUG}"
                  )

                  echo "ZIP_PATH=${BUILD_DIR}/${ZIP_NAME}" >> "$GITHUB_ENV"

            - name: Create Git tag
              shell: bash
              run: |
                  set -euo pipefail

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  if git rev-parse "${TAG}" >/dev/null 2>&1; then
                    echo "Tag ${TAG} already exists locally"
                  else
                    git tag "${TAG}"
                  fi

                  git push origin "${TAG}"

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.TAG }}
                  name: Rallyestage ${{ env.TAG }}
                  generate_release_notes: true
                  files: ${{ env.ZIP_PATH }}
